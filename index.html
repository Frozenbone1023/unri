    const conceptView = document.getElementById('conceptView');
    const quizView = document.getElementById('quizView');
    const partTabs = document.getElementById('partTabs');
    const conceptTab = document.getElementById('conceptTab');
    const quizTab = document.getElementById('quizTab');
    const blankToggle = document.getElementById('blankToggle');
    const blankDot = document.getElementById('blankDot');
    const checkAllBlanks = document.getElementById('checkAllBlanks');
    const revealAllBlanks = document.getElementById('revealAllBlanks');
    const sectionNav = document.getElementById('sectionNav');
    const conceptContainer = document.getElementById('conceptContainer');
    const quizPartLabel = document.getElementById('quizPartLabel');
    const questionNumber = document.getElementById('questionNumber');
    const quizQuestion = document.getElementById('quizQuestion');
    const scoreText = document.getElementById('scoreText');
    const totalText = document.getElementById('totalText');
    const progressBar = document.getElementById('progressBar');
    const feedbackBox = document.getElementById('feedbackBox');
    const feedbackTitle = document.getElementById('feedbackTitle');
    const feedbackExplanation = document.getElementById('feedbackExplanation');
    const nextQuestionBtn = document.getElementById('nextQuestionBtn');
    const resetQuizBtn = document.getElementById('resetQuizBtn');
    const choiceButtons = Array.from(document.querySelectorAll('.quiz-choice'));

    let activePart = 'happiness';
    let activeSubtab = 'concept';
    let blankMode = false;
    let currentQuestionIndex = 0;
    let score = 0;
    let answered = false;

    function escapeRegExp(text) {
      return text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function escapeHtml(text) {
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }

    function normalizeAnswer(text) {
      return text.replace(/\s+/g, '').replace(/[·ㆍ,，.]/g, '').toLowerCase();
    }

    function applyInputBlanks(line) {
      let safe = escapeHtml(line.text);
      if (!blankMode) return safe;
      const sorted = [...line.blanks].sort((a, b) => b.length - a.length);
      sorted.forEach((answer) => {
        const pattern = new RegExp(escapeRegExp(escapeHtml(answer)));
        safe = safe.replace(pattern, () => {
          const encoded = escapeHtml(answer);
          return `<span class="blank-wrap"><input class="blank-input" data-answer="${encoded}" aria-label="${encoded} 빈칸 입력" /><button class="blank-check" type="button" aria-label="정답 확인">확인</button></span>`;
        });
      });
      return safe;
    }

    function applyInputBlanksFromMarkers(line) {
      const safe = escapeHtml(line.text);
      if (!blankMode) return safe.replace(/\[([^\]]+)\]/g, '$1');
      return safe.replace(/\[([^\]]+)\]/g, (match, answer) => {
        const encoded = escapeHtml(answer);
        return `<span class="blank-wrap"><input class="blank-input" data-answer="${encoded}" aria-label="${encoded} 빈칸 입력" /><button class="blank-check" type="button" aria-label="정답 확인">확인</button></span>`;
      });
    }

    function getAccent(partKey) {
      const isEcology = partKey === 'ecology';
      return {
        badge: isEcology ? 'bg-emerald-600 text-white' : 'bg-indigo-600 text-white',
        soft: isEcology ? 'bg-emerald-50' : 'bg-indigo-50',
        text: isEcology ? 'text-emerald-700' : 'text-indigo-700',
        border: isEcology ? 'border-emerald-200' : 'border-indigo-200',
        bar: isEcology ? 'bg-emerald-600' : 'bg-indigo-600'
      };
    }

    function renderPartTabs() {
      partTabs.innerHTML = Object.entries(studyData).map(([key, part]) => {
        const active = key === activePart;
        const accent = getAccent(key);
        return `
          <button class="rounded-lg border px-4 py-3 text-left transition ${active ? `${accent.border} ${accent.soft} shadow-sm` : 'border-slate-200 bg-white hover:bg-slate-50'}" type="button" data-part="${key}">
            <span class="block text-sm font-black ${active ? accent.text : 'text-slate-700'}">${part.title}</span>
            <span class="mt-0.5 block text-xs font-bold text-slate-500">${part.label}</span>
          </button>
        `;
      }).join('');
      document.querySelectorAll('[data-part]').forEach((button) => {
        button.addEventListener('click', () => {
          activePart = button.dataset.part;
          resetQuiz(false);
          renderAll();
        });
      });
    }

    function renderConcepts() {
      const part = studyData[activePart];
      const accent = getAccent(activePart);
      sectionNav.innerHTML = part.sections.map((section, index) => `
        <a href="#section-${index}" class="rounded-lg border ${accent.border} ${accent.soft} px-3 py-3 text-sm font-black ${accent.text} transition hover:translate-x-0.5">${section.title}</a>
      `).join('');

      conceptContainer.innerHTML = part.sections.map((section, sectionIndex) => `
        <section id="section-${sectionIndex}" class="scroll-mt-5">
          <div class="mb-3 flex items-center gap-3">
            <span class="rounded-md px-3 py-1.5 text-sm font-black ${accent.badge}">${section.title}</span>
            <div class="h-px flex-1 bg-slate-200"></div>
          </div>
          <div class="grid gap-3">
            ${section.items.map((item) => `
              <article class="concept-card rounded-lg border ${item.special === 'source' ? accent.border : 'border-slate-200'} ${item.special === 'source' ? accent.soft : 'bg-white'} shadow-sm">
                <div class="grid gap-0 md:grid-cols-[13.5rem_1fr]">
                  <div class="border-b border-slate-200 ${item.special === 'source' ? 'bg-white/65' : accent.soft} p-4 md:border-b-0 md:border-r">
                    <p class="text-xs font-black uppercase tracking-wide text-slate-500">${item.special === 'source' ? 'Reading' : 'Topic'}</p>
                    <h3 class="mt-2 text-xl font-black ${accent.text}">${item.name}</h3>
                  </div>
                  <div class="p-4">
                    <p class="mb-3 text-xs font-black uppercase tracking-wide text-slate-500">${item.special === 'source' ? 'Source Notes' : 'Core Concepts'}</p>
                    <ul class="space-y-2.5">
                      ${item.lines.map((line) => `
                        <li class="flex gap-2 leading-relaxed text-slate-800">
                          <span class="mt-2 h-1.5 w-1.5 shrink-0 rounded-full ${item.special === 'source' ? 'bg-indigo-500' : 'bg-emerald-500'}"></span>
                          <span>${applyInputBlanks(line)}</span>
                        </li>
                      `).join('')}
                    </ul>
                  </div>
                </div>
              </article>
            `).join('')}
          </div>
        </section>
      `).join('');

      document.querySelectorAll('.blank-check').forEach((button) => {
        button.addEventListener('click', () => checkSingleBlank(button.previousElementSibling));
      });
      document.querySelectorAll('.blank-input').forEach((input) => {
        input.addEventListener('keydown', (event) => {
          if (event.key === 'Enter') checkSingleBlank(input);
        });
      });
    }

    function checkSingleBlank(input) {
      const correct = normalizeAnswer(input.value) === normalizeAnswer(input.dataset.answer);
      input.classList.toggle('correct', correct);
      input.classList.toggle('wrong', !correct);
      if (correct) input.value = input.dataset.answer;
    }

    function checkEveryBlank() {
      document.querySelectorAll('.blank-input').forEach(checkSingleBlank);
    }

    function revealEveryBlank() {
      document.querySelectorAll('.blank-input').forEach((input) => {
        input.value = input.dataset.answer;
        input.classList.remove('wrong');
        input.classList.add('correct');
      });
    }

    function renderSubtabs() {
      const isConcept = activeSubtab === 'concept';
      conceptView.classList.toggle('hidden', !isConcept);
      quizView.classList.toggle('hidden', isConcept);
      conceptTab.className = `rounded-md px-4 py-2 text-sm font-bold transition ${isConcept ? 'bg-white text-indigo-700 shadow-sm' : 'text-slate-600 hover:text-slate-950'}`;
      quizTab.className = `rounded-md px-4 py-2 text-sm font-bold transition ${!isConcept ? 'bg-white text-indigo-700 shadow-sm' : 'text-slate-600 hover:text-slate-950'}`;
      checkAllBlanks.classList.toggle('hidden', !isConcept || !blankMode);
      revealAllBlanks.classList.toggle('hidden', !isConcept || !blankMode);
    }

    function updateBlankToggle() {
      blankToggle.setAttribute('aria-pressed', String(blankMode));
      blankToggle.classList.toggle('bg-indigo-600', blankMode);
      blankToggle.classList.toggle('text-white', blankMode);
      blankToggle.classList.toggle('border-indigo-600', blankMode);
      blankToggle.classList.toggle('bg-white', !blankMode);
      blankToggle.classList.toggle('text-indigo-700', !blankMode);
      blankDot.classList.toggle('bg-emerald-300', blankMode);
      blankDot.classList.toggle('bg-slate-300', !blankMode);
    }

    function currentQuizItems() {
      return quizData[activePart];
    }

    function renderQuestion() {
      const items = currentQuizItems();
      const item = items[currentQuestionIndex];
      answered = false;
      quizPartLabel.textContent = studyData[activePart].title;
      questionNumber.textContent = `Q${currentQuestionIndex + 1}`;
      quizQuestion.textContent = item.question;
      scoreText.textContent = score;
      totalText.textContent = items.length;
      progressBar.className = `h-full rounded-full transition-all duration-300 ${getAccent(activePart).bar}`;
      progressBar.style.width = `${(currentQuestionIndex / items.length) * 100}%`;
      feedbackBox.className = 'mt-4 hidden rounded-lg border p-4';
      feedbackTitle.textContent = '';
      feedbackExplanation.textContent = '';
      nextQuestionBtn.disabled = true;
      nextQuestionBtn.textContent = currentQuestionIndex === items.length - 1 ? '결과 보기' : '다음 문제';
      choiceButtons.forEach((button) => {
        button.disabled = false;
        button.classList.remove('bg-emerald-100', 'border-emerald-500', 'bg-rose-100', 'border-rose-500', 'opacity-60');
      });
    }

    function checkAnswer(choice) {
      if (answered) return;
      const item = currentQuizItems()[currentQuestionIndex];
      const isCorrect = choice === item.answer;
      answered = true;
      if (isCorrect) score += 1;
      choiceButtons.forEach((button) => {
        const buttonChoice = button.dataset.choice;
        button.disabled = true;
        button.classList.add('opacity-60');
        if (buttonChoice === item.answer) button.classList.add('bg-emerald-100', 'border-emerald-500');
        else if (buttonChoice === choice) button.classList.add('bg-rose-100', 'border-rose-500');
      });
      feedbackBox.className = `mt-4 rounded-lg border p-4 ${isCorrect ? 'border-emerald-200 bg-emerald-50' : 'border-rose-200 bg-rose-50'}`;
      feedbackTitle.className = `text-lg font-black ${isCorrect ? 'text-emerald-700' : 'text-rose-700'}`;
      feedbackTitle.textContent = isCorrect ? '정답입니다' : `오답입니다. 정답은 ${item.answer}입니다.`;
      feedbackExplanation.textContent = item.explanation;
      scoreText.textContent = score;
      progressBar.style.width = `${((currentQuestionIndex + 1) / currentQuizItems().length) * 100}%`;
      nextQuestionBtn.disabled = false;
    }

    function goToNextQuestion() {
      const items = currentQuizItems();
      if (currentQuestionIndex < items.length - 1) {
        currentQuestionIndex += 1;
        renderQuestion();
        return;
      }
      quizQuestion.textContent = `완료! 총 ${items.length}문제 중 ${score}문제를 맞혔습니다.`;
      questionNumber.textContent = 'Result';
      feedbackBox.className = 'mt-4 rounded-lg border border-indigo-200 bg-indigo-50 p-4';
      feedbackTitle.className = 'text-lg font-black text-indigo-700';
      feedbackTitle.textContent = score === items.length ? '완벽합니다' : '틀린 선지를 다시 확인해 보세요';
      feedbackExplanation.textContent = '개념 정리에서 빈칸 학습 모드를 켜고 핵심어를 다시 점검하면 함정선지에 더 강해집니다.';
      nextQuestionBtn.disabled = true;
      choiceButtons.forEach((button) => {
        button.disabled = true;
        button.classList.add('opacity-60');
      });
    }

    function resetQuiz(render = true) {
      currentQuestionIndex = 0;
      score = 0;
      if (render) renderQuestion();
    }

    function renderAll() {
      renderPartTabs();
      renderConcepts();
      renderSubtabs();
      updateBlankToggle();
      renderQuestion();
    }

    conceptTab.addEventListener('click', () => {
      activeSubtab = 'concept';
      renderSubtabs();
    });
    quizTab.addEventListener('click', () => {
      activeSubtab = 'quiz';
      renderSubtabs();
      renderQuestion();
    });
    blankToggle.addEventListener('click', () => {
      blankMode = !blankMode;
      updateBlankToggle();
      renderConcepts();
      renderSubtabs();
    });
    checkAllBlanks.addEventListener('click', checkEveryBlank);
    revealAllBlanks.addEventListener('click', revealEveryBlank);
    choiceButtons.forEach((button) => button.addEventListener('click', () => checkAnswer(button.dataset.choice)));
    nextQuestionBtn.addEventListener('click', goToNextQuestion);
    resetQuizBtn.addEventListener('click', () => resetQuiz(true));
    renderAll();
  </script>
</body>
